<!DOCTYPE html>
<html>
<head>
<title>Dosti?</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#ffd6e7;
margin-top:120px;
}

#buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

button{
padding:12px 25px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:10px;
transition:0.2s;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#999;
color:white;
}

#maybe{
background:#ffaa00;
color:white;
}

</style>
</head>

<body>

<h1>Tum meri bahut achi dost banogi? 😊</h1>

<div id="buttons">
<button id="yes" onclick="yes()">Haan ❤️</button>
<button id="maybe" onclick="maybe()">Pata nahi 🤔</button>
<button id="no">Nahi 😅</button>
</div>

<script>

let yesScale = 1;
let maybeScale = 1;

function yes(){
document.body.innerHTML="<h1>Yayyy! ❤️<br>Mujhe pata tha 😊</h1>";
}

function maybe(){

yesScale += 0.2;
maybeScale -= 0.1;

document.getElementById("yes").style.transform="scale("+yesScale+")";
document.getElementById("maybe").style.transform="scale("+maybeScale+")";

}

</script>

</body>
</html>
