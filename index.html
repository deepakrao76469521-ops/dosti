<!DOCTYPE html>
<html>
<head>
<title>Dosti?</title>
<style>
body{
text-align:center;
font-family:Arial;
background:#ffd6e7;
margin-top:120px;
}
button{
padding:12px 25px;
font-size:18px;
margin:10px;
cursor:pointer;
border:none;
border-radius:10px;
}
#yes{
background:#ff4d6d;
color:white;
}
#no{
position:absolute;
background:#999;
color:white;
}
#maybe{
background:#ffaa00;
color:white;
}
</style>
</head>

<body>

<h1>Tum meri bahut achi dost banogi? 😊</h1>

<button id="yes" onclick="yes()">Haan ❤️</button>
<button id="no" onmouseover="move()">Nahi 😅</button>
<button id="maybe" onclick="maybe()">Pata nahi 🤔</button>

<script>

let size = 18;

function yes(){
document.body.innerHTML="<h1>Yayyy! ❤️<br>Mujhe pata tha 😊</h1>";
document.body.style.fontSize="30px";
}

function move(){
let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;
document.getElementById("no").style.left=x+"px";
document.getElementById("no").style.top=y+"px";
}

function maybe(){
size += 10;
document.getElementById("yes").style.fontSize = size + "px";
}

</script>

</body>
</html>
