<!DOCTYPE html>
<html>
<head>
<title>Dosti?</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#ffd6e7;
margin-top:120px;
}

#buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

button{
padding:12px 25px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:10px;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
position:absolute;
background:#999;
color:white;
}

#maybe{
background:#ffaa00;
color:white;
}

</style>
</head>

<body>

<h1>Tum meri bahut achi dost banogi? 😊</h1>

<div id="buttons">
<button id="yes" onclick="yes()">Haan ❤️</button>
<button id="maybe" onclick="maybe()">Pata nahi 🤔</button>
<button id="no" onmouseover="move()">Nahi 😅</button>
</div>

<script>

let yesSize = 18;
let maybeSize = 18;

function yes(){
document.body.innerHTML="<h1>Yayyy! ❤️<br>Mujhe pata tha 😊</h1>";
document.body.style.fontSize="30px";
}

function move(){
let x=Math.random()*(window.innerWidth-100);
let y=Math.random()*(window.innerHeight-50);

document.getElementById("no").style.left=x+"px";
document.getElementById("no").style.top=y+"px";
}

function maybe(){

yesSize += 8;
maybeSize -= 2;

document.getElementById("yes").style.fontSize = yesSize + "px";
document.getElementById("maybe").style.fontSize = maybeSize + "px";

}

</script>

</body>
</html>
